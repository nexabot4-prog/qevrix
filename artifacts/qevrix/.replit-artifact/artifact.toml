kind = "web"
previewPath = "/"
title = "QEVRIX Website"
version = "1.0.0"
id = "artifacts/qevrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20380

[services.development]
run = "pnpm --filter @workspace/qevrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qevrix", "run", "build" ]
publicDir = "artifacts/qevrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20380"
BASE_PATH = "/"
